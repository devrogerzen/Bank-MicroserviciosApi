server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fintech_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

dolar:
  api:
    url: https://dolarapi.com/v1/dolares
