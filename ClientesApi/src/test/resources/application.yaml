spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

dolar:
  api:
    url: https://dolarapi.com/v1/dolares
